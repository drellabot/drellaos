d /var/home/drella 0700 drella drella -
# Enable lingering so we can run user services at boot.
# We cannot use loginctl enable-linger because it the user obviously doesn't exist during image build.
# Instead, write a file to /var/lib/systemd/linger.
# See https://github.com/systemd/systemd/issues/12401 for more details.
f /var/lib/systemd/linger/drella 0644 root root -
# Enable the orchestrator update timer for the drella user only.
# We cannot use systemctl --global enable because that would affect all users.
d /var/home/drella/.config 0755 drella drella -
d /var/home/drella/.config/systemd 0755 drella drella -
d /var/home/drella/.config/systemd/user 0755 drella drella -
d /var/home/drella/.config/systemd/user/timers.target.wants 0755 drella drella -
L+ /var/home/drella/.config/systemd/user/timers.target.wants/drella-update-orchestrator.timer - drella drella - /usr/lib/systemd/user/drella-update-orchestrator.timer
