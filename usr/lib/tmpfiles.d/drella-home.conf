d /var/home/drella 0700 drella drella -
# Enable lingering so we can run user services at boot.
# We cannot use loginctl enable-linger because it the user obviously doesn't exist during image build.
# Instead, write a file to /var/lib/systemd/linger.
# See https://github.com/systemd/systemd/issues/12401 for more details.
f /var/lib/systemd/linger/drella 0644 root root -
